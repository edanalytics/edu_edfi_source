version: 2

referential_integrity_tests:
  - k_lea: &ref_k_lea
    - relationships:
        to: ref('stg_ef3__local_education_agencies')
        field: k_lea
        tags: ['ref_integrity']

  - k_local_account: &ref_k_local_account
    - relationships:
        to: ref('stg_ef3__local_accounts')
        field: k_local_account
        tags: ['ref_integrity']

  - k_school: &ref_k_school
    - relationships:
        to: ref('stg_ef3__schools')
        field: k_school
        tags: ['ref_integrity']

  - k_staff: &ref_k_staff
    - relationships:
        to: ref('stg_ef3__staffs')
        field: k_staff
        tags: ['ref_integrity']

models:
  - name: stg_ef3__balance_sheet_dimensions
    config:
      tags: ['finance']
      enabled: "{{ var('src:domain:finance:enabled', False) }}"

  - name: stg_ef3__chart_of_accounts
    config:
      tags: ['finance']
      enabled: "{{ var('src:domain:finance:enabled', False) }}"
    columns:
      - name: k_lea
        tests:
          *ref_k_lea
      - name: k_school
        tests:
          *ref_k_school

  - name: stg_ef3__function_dimensions
    config:
      tags: ['finance']
      enabled: "{{ var('src:domain:finance:enabled', False) }}"

  - name: stg_ef3__fund_dimensions
    config:
      tags: ['finance']
      enabled: "{{ var('src:domain:finance:enabled', False) }}"

  - name: stg_ef3__local_accounts
    config:
      tags: ['finance']
      enabled: "{{ var('src:domain:finance:enabled', False) }}"
    columns:
      - name: k_lea
        tests:
          *ref_k_lea
      - name: k_school
        tests:
          *ref_k_school

  - name: stg_ef3__local_actuals
    config:
      tags: ['finance']
      enabled: "{{ var('src:domain:finance:enabled', False) }}"
    columns:
      - name: k_local_account
        tests:
          *ref_k_local_account

  - name: stg_ef3__local_budgets
    config:
      tags: ['finance']
      enabled: "{{ var('src:domain:finance:enabled', False) }}"
    columns:
